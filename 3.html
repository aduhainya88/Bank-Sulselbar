<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no">
    <title>Konfirmasi WhatsApp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #f4f4f4;
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="bg-green-600 text-white px-4 py-3 flex items-center shadow-sm">
        <a href="#" onclick="goBack()" class="mr-3">
            <i class="fas fa-arrow-left text-base"></i>
        </a>
        <h1 class="text-lg font-bold">Kembali</h1>
    </div>

    <!-- Konten Utama -->
    <div class="flex items-start justify-center px-6 pt-10"> <!-- Ubah jadi items-start dan pt-10 agar naik ke atas -->
        <div class="bg-green-50 border border-green-100 rounded-2xl p-5 w-full max-w-md text-center shadow-sm">
            
            <!-- Judul -->
            <h2 class="text-green-700 text-xl font-bold mb-3">No. Ref: BSSB127</h2>
            
            <!-- Pesan -->
            <p class="text-gray-700 text-sm mb-5">
                Untuk melanjutkan laporan silakan kirim No. Referensi melalui WhatsApp Customer Service di bawah ini.
            </p>

            <!-- Tombol WhatsApp -->
            <a href="https://wa.me/message/3GYC2UIUTTQSJ1" target="_blank" 
               class="block w-full bg-green-500 hover:bg-green-600 text-white text-lg font-bold py-3 rounded-full transition duration-300 shadow">
                HUBUNGI WHATSAPP
            </a>

        </div>
    </div>

    <script>
        // Fungsi tombol kembali
        function goBack() {
            window.history.back();
        }
    </script>

</body>
</html>
